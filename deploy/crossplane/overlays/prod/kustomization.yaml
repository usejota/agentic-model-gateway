apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Prod overlay for the free-claude-code proxy infra. One shared proxy stack.
# Replace the placeholder values below (PROJECT / REGION / ZONE) before applying.
# Mirrors octopus services/marble/infra/overlays/dev/kustomization.yaml.
#
# Placeholders used here (search-and-replace before apply):
#   <PROJECT>  e.g. jota-fcc-proxy
#   <REGION>   e.g. southamerica-east1
#   <ZONE>     e.g. southamerica-east1-a
#
# The SA email follows: serviceAccount:fcc-sa@<PROJECT>.iam.gserviceaccount.com
# The secret resource follows: projects/<PROJECT>/secrets/fcc-provider-key/versions/latest

resources:
  - ../../base

# Octopus convention: tag every resource with its environment.
labels:
  - pairs:
      environment: prod
    includeSelectors: false

patches:
  # --- Network ---
  - target:
      kind: Network
      name: fcc-network
    patch: |-
      - op: replace
        path: /spec/forProvider/project
        value: <PROJECT>

  - target:
      kind: Subnetwork
      name: fcc-subnetwork
    patch: |-
      - op: replace
        path: /spec/forProvider/project
        value: <PROJECT>
      - op: replace
        path: /spec/forProvider/region
        value: <REGION>

  # --- Router + NAT ---
  - target:
      kind: Router
      name: fcc-router
    patch: |-
      - op: replace
        path: /spec/forProvider/project
        value: <PROJECT>
      - op: replace
        path: /spec/forProvider/region
        value: <REGION>

  - target:
      kind: RouterNAT
      name: fcc-nat
    patch: |-
      - op: replace
        path: /spec/forProvider/project
        value: <PROJECT>
      - op: replace
        path: /spec/forProvider/region
        value: <REGION>

  # --- Firewalls ---
  - target:
      kind: Firewall
      name: fcc-allow-iap-proxy
    patch: |-
      - op: replace
        path: /spec/forProvider/project
        value: <PROJECT>
  - target:
      kind: Firewall
      name: fcc-allow-iap-ssh
    patch: |-
      - op: replace
        path: /spec/forProvider/project
        value: <PROJECT>

  # --- Service Account ---
  - target:
      kind: ServiceAccount
      name: fcc-sa
    patch: |-
      - op: replace
        path: /spec/forProvider/project
        value: <PROJECT>

  # --- Secret container ---
  - target:
      kind: Secret
      name: fcc-provider-key
    patch: |-
      - op: replace
        path: /spec/forProvider/project
        value: <PROJECT>

  # --- IAM ---
  - target:
      kind: SecretIAMMember
      name: fcc-sa-secret-accessor
    patch: |-
      - op: replace
        path: /spec/forProvider/project
        value: <PROJECT>
      - op: replace
        path: /spec/forProvider/member
        value: serviceAccount:fcc-sa@<PROJECT>.iam.gserviceaccount.com
  - target:
      kind: ProjectIAMMember
      name: fcc-sa-log-writer
    patch: |-
      - op: replace
        path: /spec/forProvider/project
        value: <PROJECT>
      - op: replace
        path: /spec/forProvider/member
        value: serviceAccount:fcc-sa@<PROJECT>.iam.gserviceaccount.com

  # --- Instance ---
  - target:
      kind: Instance
      name: fcc-proxy
    patch: |-
      - op: replace
        path: /spec/forProvider/project
        value: <PROJECT>
      - op: replace
        path: /spec/forProvider/zone
        value: <ZONE>
      - op: replace
        path: /spec/forProvider/metadata/PROVIDER_KEY_SECRET_RESOURCE
        value: projects/<PROJECT>/secrets/fcc-provider-key/versions/latest

  # --- Access-control IAM (instance-level) ---
  - target:
      kind: InstanceIAMMember
      name: fcc-iap-tunnel-users
    patch: |-
      - op: replace
        path: /spec/forProvider/project
        value: <PROJECT>
      - op: replace
        path: /spec/forProvider/zone
        value: <ZONE>
      - op: replace
        path: /spec/forProvider/member
        value: group:eng-claude@jota.ai
  - target:
      kind: InstanceIAMMember
      name: fcc-oslogin-admins
    patch: |-
      - op: replace
        path: /spec/forProvider/project
        value: <PROJECT>
      - op: replace
        path: /spec/forProvider/zone
        value: <ZONE>
      - op: replace
        path: /spec/forProvider/member
        value: group:eng-claude-admins@jota.ai
