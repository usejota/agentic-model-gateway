---
# Secret Manager container for the provider API key.
# IMPORTANT: only the CONTAINER is declarative here. The secret VALUE (a
# SecretVersion) is set OUT-OF-BAND so plaintext never lands in git:
#   echo -n "<provider-key>" | gcloud secrets versions add fcc-provider-key \
#     --project=<PROJECT> --data-file=-
# The proxy reads it at runtime via PROVIDER_KEY_SECRET_RESOURCE (see instance.yaml,
# domain_docs/security.md #3/#4). deletionPolicy: Orphan keeps the secret if the MR
# is deleted (mirrors octopus services/marble/infra/base/secrets.yaml).
apiVersion: secretmanager.gcp.upbound.io/v1beta1
kind: Secret
metadata:
  name: fcc-provider-key
  namespace: crossplane-system
  labels:
    service: free-claude-code
    managed-by: crossplane
  annotations:
    crossplane.io/external-name: fcc-provider-key
spec:
  forProvider:
    project: "" # patched per-env
    replication:
      - auto:
          - {}
    labels:
      service: free-claude-code
  providerConfigRef:
    name: default
  deletionPolicy: Orphan
---
# Secret Manager container for the Tailscale OAuth client secret (used by the VM to
# join the tailnet at boot — see deploy/startup.sh §3b). Value set out-of-band:
#   echo -n "<tailscale-oauth-client-secret>" | gcloud secrets versions add \
#     fcc-tailscale-oauth --project=<PROJECT> --data-file=-
# Create the OAuth client in the Tailscale admin console (Settings → OAuth clients)
# with the "devices:write" scope and the tag tag:fcc-proxy.
apiVersion: secretmanager.gcp.upbound.io/v1beta1
kind: Secret
metadata:
  name: fcc-tailscale-oauth
  namespace: crossplane-system
  labels:
    service: free-claude-code
    managed-by: crossplane
  annotations:
    crossplane.io/external-name: fcc-tailscale-oauth
spec:
  forProvider:
    project: "" # patched per-env
    replication:
      - auto:
          - {}
    labels:
      service: free-claude-code
  providerConfigRef:
    name: default
  deletionPolicy: Orphan
