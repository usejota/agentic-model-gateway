---
# Dedicated service account for the proxy VM. Least privilege: only secret-level
# Secret Manager access (see iam.yaml) — NOT broad project roles.
# Mirrors octopus services/marble/infra/base/service-accounts.yaml.
apiVersion: cloudplatform.gcp.upbound.io/v1beta1
kind: ServiceAccount
metadata:
  name: fcc-sa
  namespace: crossplane-system
  labels:
    service: free-claude-code
    managed-by: crossplane
    fcc-sa: proxy
  annotations:
    crossplane.io/external-name: fcc-sa
spec:
  forProvider:
    project: "" # patched per-env
    displayName: "Free Claude Code Proxy SA"
    description: "GSA for the free-claude-code proxy VM; secret-level Secret Manager access only."
  providerConfigRef:
    name: default
